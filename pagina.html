<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Día de la Mujer</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&amp;family=Montserrat:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      height: 100%;
      width: 100%;
    }
    
    body {
      background: linear-gradient(-45deg, #ff69b4, #ff1493, #da70d6, #ba55d3);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      color: #fff;
      font-family: 'Cormorant Garamond', 'Montserrat', serif;
    }
    
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      animation: confettiFall 3s linear forwards;
    }
    
    @keyframes confettiFall {
      0% { transform: translateY(-100%) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    
    .petal {
      position: fixed;
      pointer-events: none;
      animation: petalFall linear forwards;
      z-index: 9999;
    }
    
    @keyframes petalFall {
      0% {
        transform: translateY(-20vh) rotate(0deg) translateX(0);
        opacity: 1;
      }
      100% {
        transform: translateY(100vh) rotate(360deg) translateX(100px);
        opacity: 0;
      }
    }

    button {
      cursor: pointer;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full w-full overflow-auto">
  <div id="app" class="h-full w-full flex flex-col items-center justify-center p-4 md:p-8"><!-- Initial State -->
   <div id="initial-state" class="text-center">
    <h1 id="button-label" class="text-5xl md:text-7xl font-light mb-8 italic" style="text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); letter-spacing: 0.05em;">Para la mujer más<br class="hidden md:block">
      hermosa de mi vida</h1><button id="reveal-btn" class="px-8 py-4 bg-white text-purple-600 font-semibold text-lg rounded-full shadow-lg hover:shadow-2xl hover:scale-110 transition-all duration-300" style="font-family: 'Montserrat', sans-serif;"> (Click aqui) ✨ </button>
   </div><!-- Revealed State -->
   <div id="revealed-state" class="hidden text-center max-w-2xl">
    <div class="mb-8"><img src="https://i.pinimg.com/736x/d0/4d/f8/d04df81245b7d584e6c27f4f53f052bf.jpg" alt="Rosa especial" loading="lazy" class="rounded-2xl shadow-2xl w-80 h-80 object-cover mx-auto" onerror="this.style.background='linear-gradient(135deg, #1a1a1a, #2a2a2a)'; this.alt='🌹';">
    </div>
    <h2 id="main-title" class="text-5xl md:text-6xl font-light mb-8 italic" style="text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); letter-spacing: 0.02em;">¡Feliz Día<br class="hidden md:block">
      Internacional de la Mujer!</h2>
    <p id="dedication" class="text-xl md:text-2xl text-white/95 mb-8 font-light" style="text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3); line-height: 1.8; letter-spacing: 0.01em; font-family: 'Montserrat', sans-serif;">Eres luz, fuerza y amor en mi vida.<br>
      Gracias por ser tan maravillosa.<br>
      Te admiro y te celebro hoy y siempre.</p>
    <div class="text-6xl mb-8 flex justify-center gap-6"><span>💝</span> <span>🌹</span> <span>💐</span>
    </div>
    <p class="text-2xl mb-10">Con todo mi amor ❤️</p><button id="replay-btn" class="px-6 py-3 bg-white/20 backdrop-blur text-white font-semibold rounded-full border-2 border-white/50 hover:bg-white/30 transition-all duration-300"> 🔄 Ver de nuevo </button>
   </div>
  </div>
  <script>
    const defaultConfig = {
      button_text: "Para la mujer más hermosa de la vida",
      main_message: "¡Feliz Día Internacional de la Mujer!",
      dedication_text: "Eres luz, fuerza y amor en mi vida.\nGracias por ser tan maravillosa.\nTe admiro y te celebro hoy y siempre."
    };
    
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          const buttonLabel = document.getElementById('button-label');
          const mainTitle = document.getElementById('main-title');
          const dedication = document.getElementById('dedication');
          
          if (buttonLabel) {
            buttonLabel.textContent = config.button_text || defaultConfig.button_text;
          }
          
          if (mainTitle) {
            mainTitle.textContent = config.main_message || defaultConfig.main_message;
          }
          
          if (dedication) {
            const text = config.dedication_text || defaultConfig.dedication_text;
            dedication.innerHTML = text.replace(/\n/g, '<br>');
          }
        },
        mapToCapabilities: (config) => ({
          recolorables: [],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["button_text", config.button_text || defaultConfig.button_text],
          ["main_message", config.main_message || defaultConfig.main_message],
          ["dedication_text", config.dedication_text || defaultConfig.dedication_text]
        ])
      });
    }
    
    function createConfetti() {
      const colors = ['#f472b6', '#ec4899', '#db2777', '#fce7f3', '#fbcfe8'];
      
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * 100 + 'vw';
          confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
          confetti.style.width = Math.random() * 10 + 5 + 'px';
          confetti.style.height = confetti.style.width;
          confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
          document.body.appendChild(confetti);
          
          setTimeout(() => confetti.remove(), 4000);
        }, i * 50);
      }
    }
    
    function createPetals() {
      const petals = ['🌸', '🌺', '🌷', '💮', '🏵️'];
      
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const petal = document.createElement('div');
          petal.className = 'petal';
          petal.textContent = petals[Math.floor(Math.random() * petals.length)];
          petal.style.left = Math.random() * 100 + 'vw';
          petal.style.fontSize = Math.random() * 15 + 15 + 'px';
          petal.style.animationDuration = Math.random() * 3 + 4 + 's';
          document.body.appendChild(petal);
          
          setTimeout(() => petal.remove(), 7000);
        }, i * 200);
      }
    }
    
    function createHearts() {
      const hearts = ['❤️', '💕', '💗', '💖', '💝'];
      
      for (let i = 0; i < 30; i++) {
        setTimeout(() => {
          const heart = document.createElement('div');
          heart.className = 'petal';
          heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
          heart.style.left = Math.random() * 100 + 'vw';
          heart.style.fontSize = Math.random() * 20 + 20 + 'px';
          heart.style.animationDuration = Math.random() * 3 + 3.5 + 's';
          document.body.appendChild(heart);
          
          setTimeout(() => heart.remove(), 6500);
        }, i * 100);
      }
    }
    
    const revealBtn = document.getElementById('reveal-btn');
    const replayBtn = document.getElementById('replay-btn');
    const initialState = document.getElementById('initial-state');
    const revealedState = document.getElementById('revealed-state');
    
    revealBtn.addEventListener('click', () => {
      initialState.classList.add('hidden');
      revealedState.classList.remove('hidden');
      createConfetti();
      createPetals();
      createHearts();
    });
    
    replayBtn.addEventListener('click', () => {
      revealedState.classList.add('hidden');
      initialState.classList.remove('hidden');
    });
  </script>

</html>
